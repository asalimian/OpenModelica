# Export the `__indirect_function_table` (growable) from the runtime so a
# generated model module can import it ‚Äî exactly as it imports `rt.memory` ‚Äî and
# append its per-system `residual`/`load` functions for `rt_solve_nls` to reach
# via `call_indirect`. See `nls.rs` and CodegenWasmJit's NLS lowering.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "link-arg=--export-table", "-C", "link-arg=--growable-table"]

[target.wasm32-wasip1]
rustflags = ["-C", "link-arg=--export-table", "-C", "link-arg=--growable-table"]
